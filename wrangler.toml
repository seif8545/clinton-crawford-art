name = "clinton-crawford-art"
main = ".open-next/worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

# This tells Cloudflare where your images and CSS are stored
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# ─── CLOUDFLARE D1 DATABASE ──────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "clinton-art-db"
database_id = "d5f5820c-e018-4d6c-a0bf-6f6b3a493b1a"

# ─── ENVIRONMENT VARIABLES ───────────────────────────────────────────────────
[vars]
NEXT_PUBLIC_SITE_NAME = "Clinton Crawford Art"
NEXT_PUBLIC_ARTIST_NAME = "Dr. Clinton Crawford"

# SECRETS (Set these in the Cloudflare Dashboard under Worker Settings)
# ADMIN_PASSWORD
# ADMIN_SECRET_KEY