name = "clinton-crawford-art"
main = ".open-next/worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

# Add this line back so Pages stops complaining, but point it to .open-next
pages_build_output_dir = ".open-next/assets"

[assets]
directory = ".open-next/assets"
binding = "CLOUDFLARE_ASSETS" # <--- Change this from ASSETS to CLOUDFLARE_ASSETS

# ─── CLOUDFLARE D1 DATABASE ──────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "clinton-art-db"
database_id = "d5f5820c-e018-4d6c-a0bf-6f6b3a493b1a"

# ─── ENVIRONMENT VARIABLES ───────────────────────────────────────────────────
[vars]
NEXT_PUBLIC_SITE_NAME = "Clinton Crawford Art"
NEXT_PUBLIC_ARTIST_NAME = "Dr. Clinton Crawford"

# SECRETS (Set these in the Cloudflare Dashboard under Worker Settings)
# ADMIN_PASSWORD
# ADMIN_SECRET_KEY